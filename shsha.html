    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            height: 100%;
            background-color: #000;
            font-family: 'Courier New', monospace;
        }

        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .video-bg video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            filter: brightness(0.3) grayscale(100%);
        }

        .content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%);
        }

        .imagehold {
            text-align: center;
            margin-bottom: 20px;
            animation: fadeIn 1s ease-in-out;
        }

        .imagehold img {
            max-width: 300px;
            width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.1);
            filter: grayscale(100%);
        }

        .text-line {
            font-size: clamp(24px, 6vw, 48px);
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 5px 0;
            opacity: 1;
            animation: fadeIn 1s ease-in-out;
        }

        .text-line.small {
            font-size: clamp(18px, 4vw, 32px);
            letter-spacing: 2px;
        }

        .text-line.smaller {
            font-size: clamp(16px, 3vw, 28px);
            letter-spacing: 1px;
        }

        .main-texts {
            text-align: center;
            animation: fadeIn 1.5s ease-in-out;
        }

        .ip-section {
            margin-top: 30px;
            text-align: center;
            width: 100%;
            max-width: 500px;
            animation: fadeIn 1s ease-in-out 2s forwards;
            opacity: 0;
        }

        .ip-block {
            margin-bottom: 15px;
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ip-label {
            color: #666;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
            font-weight: normal;
        }

        .ip-value {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .ip-details {
            margin-top: 10px;
            color: #aaa;
            font-size: 16px;
            line-height: 1.8;
        }

        .ip-details div {
            margin: 5px 0;
            padding: 5px 0;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.05);
        }

        .glitch-text-bottom {
            width: 100%;
            text-align: center;
            position: fixed;
            bottom: 10px;
            color: #666;
            font-size: 18px;
            z-index: 20;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: bold;
            animation: subtleGlitch 3s infinite, fadeIn 1s ease-in-out 2.5s forwards;
            opacity: 0;
            text-shadow: 
                1px 1px 0 rgba(255,255,255,0.1),
                -1px -1px 0 rgba(255,255,255,0.1);
        }

        @keyframes subtleGlitch {
            0%, 100% { 
                transform: translate(0, 0) skew(0deg); 
                opacity: 0.7;
            }
            25% { 
                transform: translate(1px, -1px) skew(0.5deg); 
                opacity: 0.8;
            }
            50% { 
                transform: translate(-1px, 1px) skew(-0.5deg); 
                opacity: 0.7;
            }
            75% { 
                transform: translate(1px, 1px) skew(0.5deg); 
                opacity: 0.8;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        body {
            pointer-events: none;
        }

        .content, .content * {
            pointer-events: auto;
        }

        .content {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body>

    <script>
        // ========== الحماية القوية ==========
        
        // 1. منع جميع اختصارات لوحة المفاتيح الخطيرة
        document.addEventListener("keydown", function (e) {
            // منع F12
            if (e.key === "F12") {
                e.preventDefault();
                return false;
            }
            
            // منع Ctrl+U (عرض المصدر) - أهم شيء
            if (e.ctrlKey && (e.key === "u" || e.key === "U")) {
                e.preventDefault();
                return false;
            }
            
            // منع Ctrl+Shift+I / J / C
            if (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J" || e.key === "C" || e.key === "i" || e.key === "j" || e.key === "c")) {
                e.preventDefault();
                return false;
            }
            
            // منع Ctrl+S / Ctrl+P / Ctrl+Shift+P
            if (e.ctrlKey && (e.key === "s" || e.key === "S" || e.key === "p" || e.key === "P")) {
                e.preventDefault();
                return false;
            }
            
            // منع F5 / Ctrl+R (refresh)
            if (e.key === "F5" || (e.ctrlKey && e.key === "r" || e.ctrlKey && e.key === "R")) {
                e.preventDefault();
                return false;
            }
            
            // منع Ctrl+A (تحديد الكل)
            if (e.ctrlKey && (e.key === "a" || e.key === "A")) {
                e.preventDefault();
                return false;
            }
        });

        // 2. منع كليك يمين
        document.addEventListener("contextmenu", function (e) {
            e.preventDefault();
            return false;
        });

        // 3. منع سحب النصوص والصور
        document.addEventListener("dragstart", function(e) {
            e.preventDefault();
            return false;
        });

        // 4. منع تحديد النص
        document.addEventListener("selectstart", function(e) {
            e.preventDefault();
            return false;
        });

        // 5. منع النسخ والقص واللصق
        document.addEventListener("copy", function(e) {
            e.preventDefault();
            return false;
        });
        
        document.addEventListener("cut", function(e) {
            e.preventDefault();
            return false;
        });
        
        document.addEventListener("paste", function(e) {
            e.preventDefault();
            return false;
        });

        // 6. منع فتح قائمة الزر الأيمن
        document.addEventListener('mousedown', (e) => {
            if (e.button === 2) {
                e.preventDefault();
                return false;
            }
        });

        // 7. محاولة إغلاق DevTools إذا فُتحت
        setInterval(function () {
            const before = new Date().getTime();
            debugger;
            const after = new Date().getTime();
            if (after - before > 100) {
                document.body.innerHTML = "<div style='color:white; background:black; height:100vh; display:flex; align-items:center; justify-content:center; font-family:Courier New; font-size:24px;'>⚠️ ACCESS DENIED ⚠️</div>";
                document.body.style.background = "black";
            }
        }, 500);

        // 8. منع استخدام اختصارات المتصفح الأخرى
        window.addEventListener('keyup', function(e) {
            if (e.key === "F12" || (e.ctrlKey && e.key === "u") || (e.ctrlKey && e.key === "U")) {
                e.preventDefault();
                return false;
            }
        });

        // 9. منع فتح المصدر من القائمة (حماية إضافية)
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                setTimeout(function() {
                    if (!document.hidden) {
                        window.location.reload();
                    }
                }, 100);
            }
        });

        // 10. تعطيل اختصارات المتصفح كلها
        window.addEventListener('keydown', function(e) {
            if (e.ctrlKey || e.metaKey || e.altKey) {
                e.preventDefault();
                return false;
            }
        }, false);

        // ========== جلب معلومات IP ==========
        (function() {
            'use strict';

            async function fetchIPInfo() {
                const ipEl = document.getElementById('ip-address');
                const locationEl = document.getElementById('ip-location');
                const orgEl = document.getElementById('ip-org');
                const timezoneEl = document.getElementById('ip-timezone');
                const coordsEl = document.getElementById('ip-coords');

                try {
                    const ipResponse = await fetch('https://api.ipify.org/?format=json');
                    const ipData = await ipResponse.json();
                    const ip = ipData.ip;
                    
                    const infoResponse = await fetch(`https://ipinfo.io/${ip}/json`);
                    const infoData = await infoResponse.json();
                    
                    ipEl.textContent = ip;
                    
                    const location = [];
                    if (infoData.city) location.push(infoData.city);
                    if (infoData.region) location.push(infoData.region);
                    if (infoData.country) location.push(infoData.country);
                    locationEl.textContent = location.join(', ') || 'غير معروف';
                    
                    orgEl.textContent = infoData.org ? `ISP: ${infoData.org}` : 'ISP: غير معروف';
                    timezoneEl.textContent = infoData.timezone ? `Timezone: ${infoData.timezone}` : 'Timezone: غير معروف';
                    coordsEl.textContent = infoData.loc ? `Coordinates: ${infoData.loc}` : 'Coordinates: غير معروف';

                } catch (error) {
                    ipEl.textContent = 'فشل التحميل';
                    locationEl.textContent = 'غير متاح';
                    orgEl.textContent = 'ISP: غير متاح';
                    timezoneEl.textContent = 'Timezone: غير متاح';
                    coordsEl.textContent = 'Coordinates: غير متاح';
                }
            }

            fetchIPInfo();
        })();
    </script>
